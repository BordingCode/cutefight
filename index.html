<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Cute Fight</title>
<meta name="description" content="A cute monster-catching brawler — fight, daze, and catch wild monsters on your journey to the Summit.">
<meta name="theme-color" content="#6db9e8">
<link rel="manifest" href="manifest.json?v=20260706a">
<link rel="icon" href="assets/icons/icon.svg?v=20260706a" type="image/svg+xml">
<link rel="apple-touch-icon" href="assets/icons/icon-192.png?v=20260706a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="stylesheet" href="css/main.css?v=20260706a">
<script>
// hub-stats tracker v2
(function(){try{var A="cutefight",K="hubdev",d=localStorage.getItem(K);if(!d){d=(self.crypto&&crypto.randomUUID?crypto.randomUUID():Date.now()+"."+Math.random().toString(36).slice(2));localStorage.setItem(K,d);}var u="https://hub-stats.mathiasjob.workers.dev/hit",b=JSON.stringify({app:A,d:d});if(navigator.sendBeacon){navigator.sendBeacon(u,b);}else{fetch(u,{method:"POST",body:b,keepalive:true,mode:"no-cors"});}}catch(e){}})();
</script>
<script>
// boot watchdog: if the game hasn't rendered within 3.5s, nuke SW + caches once and reload
(function(){
  setTimeout(function(){
    if (window.__cf) return;
    if (sessionStorage.getItem('cf_rescued')) return;
    sessionStorage.setItem('cf_rescued', '1');
    Promise.all([
      'serviceWorker' in navigator ? navigator.serviceWorker.getRegistrations().then(function(rs){return Promise.all(rs.map(function(r){return r.unregister()}))}) : null,
      window.caches ? caches.keys().then(function(ks){return Promise.all(ks.map(function(k){return caches.delete(k)}))}) : null
    ]).then(function(){ location.reload(); });
  }, 3500);
})();
</script>
</head>
<body>
<canvas id="game"></canvas>

<div id="padzone"></div>
<div id="joybase"><div id="joyknob"></div></div>
<button class="actionbtn" id="abilitybtn">
  <svg width="30" height="30" viewBox="0 0 24 24"><path d="M12 21a6 6 0 0 0 6-6c0-4-4-6-4.5-10C11 7 11 9 9.5 10.5 8.7 9.8 8.5 8.6 8.5 7.6 6.8 9 6 11.5 6 15a6 6 0 0 0 6 6z" fill="#e8763e" stroke="#33272e" stroke-width="1.6"/></svg>
</button>
<button class="actionbtn" id="catchbtn">
  <svg width="34" height="34" viewBox="0 0 32 32"><circle cx="16" cy="16" r="13" fill="#fff3df" stroke="#33272e" stroke-width="2.5"/><path d="M3 16 a13 13 0 0 1 26 0 z" fill="#f2b134" stroke="#33272e" stroke-width="2.5"/><circle cx="12" cy="9" r="3" fill="#fff" opacity="0.8"/></svg>
</button>

<div id="teamstrip"></div>

<div id="hud">
  <div id="hearts"></div>
  <div id="stats">
    <span id="lvltag">Lv 1</span>
    <span id="xpbar"><i id="xpfill"></i></span>
    <span><i class="ic ic-orb"></i> <span id="orbcount">5</span></span>
    <span><i class="ic ic-dex"></i> <span id="caughtcount">0</span></span>
    <button id="mutebtn">♪</button>
  </div>
</div>
<div id="toast"></div>
<div id="hint"></div>

<div id="title">
  <h1>CUTE FIGHT</h1>
  <p>one thumb · your monster does the fighting — you do the thinking</p>
  <button id="startbtn">PLAY</button>
</div>

<div id="rotate"><span>📱</span>Hold your phone upright to play!</div>

<div class="overlay" id="starter">
  <div class="panel">
    <h2>The storm over the Summit hasn't stopped for a year.<br>The fields are drowning. Someone small and brave must climb.</h2>
    <p>Choose your partner:</p>
    <div id="startercards"></div>
  </div>
</div>

<div class="overlay" id="ending">
  <div class="panel">
    <h2 id="endtitle"></h2>
    <p id="endtext"></p>
    <button id="endclose" class="bigbtn">Keep wandering</button>
  </div>
</div>

<script type="module" src="js/main.js?v=20260706a"></script>
</body>
</html>
